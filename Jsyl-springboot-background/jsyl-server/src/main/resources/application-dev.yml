server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jsyl_ms?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 10
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 5
        max-concurrency: 10

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jsyl.model.**.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      jsyl:
        mapper: debug
        service: info
        controller: info

jsyl:
  jwt:
    admin-secret-key: itcast_admin_secret_key_very_long_256bits_required
    admin-ttl: 7200000
    admin-token-name: token
    user-secret-key: itheima_user_secret_key_very_long_256bits_required
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: your_access_key_id
    access-key-secret: your_access_key_secret
    bucket-name: your_bucket_name
  wechat:
    appid: your_wechat_appid
    secret: your_wechat_secret
